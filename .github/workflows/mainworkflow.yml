name: terraform-multi-env-10

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod

      action:
        description: "Select action"
        required: true
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Environment Variable
        run: echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_ENV

      - name: Set AWS Region
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "dev" ]]; then
            echo "AWS_REGION=ap-south-1" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.environment }}" == "qa" ]]; then
            echo "AWS_REGION=us-east-1" >> $GITHUB_ENV
          elif [[ "${{ github.event.inputs.environment }}" == "prod" ]]; then
            echo "AWS_REGION=eu-west-1" >> $GITHUB_ENV
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}   # ✅ FIXED
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean Terraform Cache
        run: rm -rf .terraform

      - name: Terraform Init
        working-directory: environments/${{ env.ENVIRONMENT }}
        run: terraform init

      - name: Terraform Plan
        working-directory: environments/${{ env.ENVIRONMENT }}
        run: |
          terraform plan \
          -var="aws_region=${{ env.AWS_REGION }}" \
          -var="environment=${{ env.ENVIRONMENT }}"

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: environments/${{ env.ENVIRONMENT }}
        run: |
          terraform apply -auto-approve \
          -var="aws_region=${{ env.AWS_REGION }}" \
          -var="environment=${{ env.ENVIRONMENT }}"

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        working-directory: environments/${{ env.ENVIRONMENT }}
        run: |
          terraform destroy -auto-approve \
          -var="aws_region=${{ env.AWS_REGION }}" \
          -var="environment=${{ env.ENVIRONMENT }}"
